<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seed Video DAG Cytoscape</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #fff;
      --ink: #1f2937;
      --muted: #667085;
      --line: #d0d5dd;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: var(--bg);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: 56px 1fr;
      width: 100vw;
      height: 100vh;
      min-width: 960px;
    }

    .app.detail-open {
      grid-template-columns: 1fr 360px;
    }

    .toolbar {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 250px;
      font-weight: 750;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 6px;
      color: white;
      background: #111827;
      font-size: 15px;
    }

    .toolbar-spacer { flex: 1; }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f9fafb;
    }

    .text-button,
    .icon-button {
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      user-select: none;
    }

    .icon-button {
      width: 34px;
      font-size: 18px;
    }

    .text-button {
      padding: 0 11px;
      font-size: 13px;
      white-space: nowrap;
    }

    .text-button:hover,
    .icon-button:hover {
      border-color: var(--line);
      background: white;
    }

    .text-button.active {
      color: var(--accent);
      border-color: #bfdbfe;
      background: var(--accent-soft);
    }

    .search-input {
      width: 220px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      color: var(--ink);
      background: white;
    }

    .graph-shell {
      position: relative;
      min-width: 0;
      min-height: 0;
      background: #f8fafc;
    }

    #cy {
      position: absolute;
      inset: 0;
    }

    .status {
      position: absolute;
      left: 16px;
      bottom: 16px;
      display: flex;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: rgb(255 255 255 / 90%);
      font-size: 12px;
      z-index: 3;
    }

    .detail {
      display: none;
      min-width: 0;
      border-left: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
    }

    .app.detail-open .detail {
      display: flex;
      flex-direction: column;
    }

    .detail-header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .detail-title {
      margin-top: 6px;
      font-size: 18px;
      font-weight: 750;
      line-height: 1.25;
    }

    .detail-body {
      overflow: auto;
      padding: 14px 16px 18px;
    }

    .preview {
      display: none;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #f8fafc;
    }

    .preview.active { display: block; }

    .preview video,
    .preview audio,
    .preview img {
      display: block;
      width: 100%;
      max-height: 240px;
      object-fit: contain;
      background: #0f172a;
    }

    .preview audio {
      padding: 10px;
      background: #f8fafc;
    }

    .preview-gallery {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 6px;
      padding: 6px;
    }

    .preview-gallery img {
      height: 96px;
      border-radius: 6px;
      object-fit: cover;
      background: #0f172a;
    }

    .path-link {
      display: block;
      padding: 8px 10px;
      color: var(--muted);
      font-size: 12px;
      word-break: break-all;
      border-top: 1px solid var(--line);
    }

    .field { margin-bottom: 14px; }

    .field label {
      display: block;
      margin-bottom: 6px;
      color: #344054;
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px 9px;
      color: var(--ink);
      background: #fff;
    }

    .field textarea {
      min-height: 108px;
      resize: vertical;
      line-height: 1.45;
    }

    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }

    .metric {
      padding: 5px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #344054;
      background: #f8fafc;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main class="app" id="app">
    <header class="toolbar">
      <div class="brand">
        <div class="brand-mark">S</div>
        <span>Seed DAG Cytoscape</span>
      </div>
      <div class="tool-group" aria-label="View tools">
        <button class="icon-button" id="fitView" title="适配视图">⌖</button>
        <button class="text-button" id="layoutGraph" title="重新布局">↔ <span>布局</span></button>
      </div>
      <div class="tool-group" aria-label="Expansion tools">
        <button class="text-button active" id="compactGraph" title="只显示核心链路">简版</button>
        <button class="text-button" id="expandGraph" title="展开所有子节点">全展开</button>
      </div>
      <input class="search-input" id="graphSearch" type="search" placeholder="搜索节点">
      <div class="toolbar-spacer"></div>
      <div class="tool-group" aria-label="Details">
        <button class="text-button" id="toggleDetail" title="显示或隐藏右侧详情">☰ <span>详情</span></button>
      </div>
    </header>

    <section class="graph-shell">
      <div id="cy"></div>
      <div class="status">
        <span id="nodeCount">0 nodes</span>
        <span>·</span>
        <span id="edgeCount">0 edges</span>
      </div>
    </section>

    <aside class="detail">
      <div class="detail-header">
        <div class="eyebrow" id="detailType">Node</div>
        <div class="detail-title" id="detailTitle">选择一个节点</div>
      </div>
      <div class="detail-body">
        <div class="preview" id="preview"></div>
        <div class="metrics" id="metrics"></div>
        <div class="field">
          <label for="titleInput">标题</label>
          <input id="titleInput" type="text" readonly>
        </div>
        <div class="field">
          <label for="bodyInput">说明</label>
          <textarea id="bodyInput" readonly></textarea>
        </div>
      </div>
    </aside>
  </main>

  <script src="vendor/cytoscape.min.js"></script>
  <script>
    const initialGraph = {
      version: 1,
      title: "Demo",
      owner: "demo",
      platform: "manual",
      nodes: [
        { id: "source", type: "source", title: "Source", body: "导入来源", metrics: ["source"] },
        { id: "transcript", type: "transcript", title: "Transcript", body: "文字语言", metrics: ["text"] },
        { id: "visual", type: "visual", title: "Visual Notes", body: "视觉语言", metrics: ["frames"] },
        { id: "semantics", type: "semantics", title: "Video Semantics", body: "语义融合", metrics: ["methods"] }
      ],
      edges: [["source", "transcript"], ["source", "visual"], ["transcript", "semantics"], ["visual", "semantics"]]
    };

    const defaultCompactMode = window.SEED_DEFAULT_COMPACT !== false;
    const state = {
      graph: window.SEED_EMBEDDED_GRAPH || initialGraph,
      compactMode: defaultCompactMode,
      expandedIds: new Set(),
      selectedId: null,
      filter: "",
      detailOpen: false,
      cy: null
    };

    const app = document.getElementById("app");
    const nodeCount = document.getElementById("nodeCount");
    const edgeCount = document.getElementById("edgeCount");
    const graphSearch = document.getElementById("graphSearch");
    const compactGraph = document.getElementById("compactGraph");
    const expandGraph = document.getElementById("expandGraph");
    const toggleDetail = document.getElementById("toggleDetail");
    const preview = document.getElementById("preview");
    const detailType = document.getElementById("detailType");
    const detailTitle = document.getElementById("detailTitle");
    const titleInput = document.getElementById("titleInput");
    const bodyInput = document.getElementById("bodyInput");
    const metricsEl = document.getElementById("metrics");

    function init() {
      state.selectedId = defaultSelectedNodeId();
      state.cy = cytoscape({
        container: document.getElementById("cy"),
        elements: graphElements(),
        minZoom: 0.2,
        maxZoom: 2.4,
        wheelSensitivity: 0.18,
        hideEdgesOnViewport: true,
        textureOnViewport: true,
        style: [
          {
            selector: "node",
            style: {
              "label": "data(label)",
              "shape": "round-rectangle",
              "width": 170,
              "height": 54,
              "background-color": "data(color)",
              "border-width": 1,
              "border-color": "#cbd5e1",
              "color": "#1f2937",
              "font-size": 12,
              "font-weight": 600,
              "text-wrap": "wrap",
              "text-max-width": 146,
              "text-valign": "center",
              "text-halign": "center",
              "overlay-opacity": 0
            }
          },
          {
            selector: "node:selected",
            style: {
              "border-width": 3,
              "border-color": "#2563eb"
            }
          },
          {
            selector: "edge",
            style: {
              "curve-style": "bezier",
              "width": 1.4,
              "line-color": "#94a3b8",
              "target-arrow-shape": "triangle",
              "target-arrow-color": "#94a3b8",
              "arrow-scale": 0.8,
              "overlay-opacity": 0
            }
          },
          {
            selector: ".faded",
            style: {
              "opacity": 0.16
            }
          }
        ],
        layout: layoutOptions()
      });
      state.cy.on("tap", "node", (event) => selectNode(event.target.id(), { open: state.detailOpen }));
      state.cy.on("tap", (event) => {
        if (event.target === state.cy) clearFocus();
      });
      selectNode(state.selectedId, { open: false, fit: false });
      renderStatus();
    }

    function graphElements() {
      const visible = visibleGraph();
      const nodes = visible.nodes.map((node) => ({
        data: {
          id: node.id,
          label: node.title || node.id,
          type: node.type,
          color: nodeColor(node.type)
        }
      }));
      const edges = visible.edges.map((edge, index) => ({
        data: {
          id: `edge-${index}-${edge[0]}-${edge[1]}`,
          source: edge[0],
          target: edge[1]
        }
      }));
      return [...nodes, ...edges];
    }

    function visibleGraph() {
      const query = state.filter.trim().toLowerCase();
      if (query) {
        const nodes = state.graph.nodes.filter((node) => nodeMatches(node, query));
        const ids = new Set(nodes.map((node) => node.id));
        return { nodes, edges: state.graph.edges.filter(([from, to]) => ids.has(from) && ids.has(to)) };
      }
      if (!state.compactMode) return { nodes: state.graph.nodes, edges: state.graph.edges };
      const ids = new Set(coreNodeIds());
      for (const parentId of state.expandedIds) {
        ids.add(parentId);
        for (const childId of childNodeIds(parentId)) ids.add(childId);
      }
      const nodes = state.graph.nodes.filter((node) => ids.has(node.id));
      return { nodes, edges: state.graph.edges.filter(([from, to]) => ids.has(from) && ids.has(to)) };
    }

    function reloadGraph({ fit = true } = {}) {
      const elements = graphElements();
      state.cy.elements().remove();
      state.cy.add(elements);
      runLayout({ fit });
      renderStatus();
      if (state.selectedId && state.cy.$id(state.selectedId).length) {
        state.cy.$id(state.selectedId).select();
      }
    }

    function runLayout({ fit = true } = {}) {
      state.cy.layout(layoutOptions()).run();
      if (fit) window.setTimeout(() => state.cy.fit(undefined, 72), 60);
    }

    function layoutOptions() {
      return {
        name: "breadthfirst",
        directed: true,
        padding: 72,
        spacingFactor: 1.15,
        avoidOverlap: true,
        animate: false
      };
    }

    function selectNode(id, { open = false, fit = false } = {}) {
      const node = state.graph.nodes.find((item) => item.id === id);
      if (!node) return;
      state.selectedId = id;
      state.cy.nodes().unselect();
      const cyNode = state.cy.$id(id);
      if (cyNode.length) {
        cyNode.select();
        focusNeighborhood(cyNode);
        if (fit) state.cy.animate({ center: { eles: cyNode }, zoom: Math.max(state.cy.zoom(), 0.9) }, { duration: 120 });
      }
      renderDetail(node);
      if (open) setDetailOpen(true);
    }

    function clearFocus() {
      state.cy.elements().removeClass("faded");
    }

    function focusNeighborhood(cyNode) {
      state.cy.elements().addClass("faded");
      cyNode.closedNeighborhood().removeClass("faded");
    }

    function renderDetail(node) {
      detailType.textContent = node.type || "node";
      detailTitle.textContent = node.title || node.id;
      titleInput.value = node.title || node.id;
      bodyInput.value = node.body || "";
      metricsEl.innerHTML = (node.metrics || []).map((metric) => `<span class="metric">${escapeHtml(metric)}</span>`).join("");
      if (state.detailOpen) renderPreview(node);
    }

    function renderPreview(node) {
      preview.className = "preview";
      preview.innerHTML = "";
      const previewData = previewDataForNode(node);
      if (!previewData && !node.path) return;
      if (previewData?.type === "video") {
        preview.innerHTML = `<video controls preload="none" src="${escapeAttr(resolveAssetUrl(previewData.src))}"></video>`;
      } else if (previewData?.type === "audio") {
        preview.innerHTML = `<audio controls preload="none" src="${escapeAttr(resolveAssetUrl(previewData.src))}"></audio>`;
      } else if (previewData?.type === "image") {
        preview.innerHTML = `<img loading="lazy" decoding="async" src="${escapeAttr(resolveAssetUrl(previewData.src))}" alt="">`;
      } else if (previewData?.type === "gallery") {
        const items = previewData.items || [];
        preview.innerHTML = `<div class="preview-gallery">${items.map((item) => `<img loading="lazy" decoding="async" src="${escapeAttr(resolveAssetUrl(item))}" alt="">`).join("")}</div>`;
      }
      if (node.path) {
        preview.insertAdjacentHTML("beforeend", `<a class="path-link" href="${escapeAttr(resolveAssetUrl(node.path))}" target="_blank">${escapeHtml(node.path)}</a>`);
      }
      preview.classList.add("active");
    }

    function setDetailOpen(open) {
      state.detailOpen = open;
      app.classList.toggle("detail-open", open);
      toggleDetail.classList.toggle("active", open);
      if (open && state.selectedId) renderPreview(state.graph.nodes.find((node) => node.id === state.selectedId));
      if (!open) {
        preview.className = "preview";
        preview.innerHTML = "";
      }
      window.setTimeout(() => {
        state.cy.resize();
        state.cy.fit(undefined, 72);
      }, 0);
    }

    function renderStatus() {
      const graph = visibleGraph();
      nodeCount.textContent = `${graph.nodes.length}/${state.graph.nodes.length} nodes`;
      edgeCount.textContent = `${graph.edges.length}/${state.graph.edges.length} edges`;
      compactGraph.classList.toggle("active", state.compactMode);
      expandGraph.classList.toggle("active", !state.compactMode);
    }

    function coreNodeIds() {
      const children = new Set(state.graph.nodes.filter((node) => isCollapsibleChild(node.id)).map((node) => node.id));
      return state.graph.nodes.map((node) => node.id).filter((id) => !children.has(id));
    }

    function isCollapsibleChild(id) {
      return /^timeline-event-\d+$/.test(id) || /^claim-\d+$/.test(id);
    }

    function childNodeIds(parentId) {
      return state.graph.edges
        .filter(([fromId, toId]) => fromId === parentId && isCollapsibleChild(toId))
        .map(([, toId]) => toId);
    }

    function nodeMatches(node, query) {
      return [node.id, node.type, node.title, node.body, ...(node.metrics || [])]
        .join(" ")
        .toLowerCase()
        .includes(query);
    }

    function defaultSelectedNodeId() {
      return state.graph.nodes.find((node) => node.id === "semantics")?.id
        || state.graph.nodes.find((node) => node.type === "semantics")?.id
        || state.graph.nodes[0]?.id
        || null;
    }

    function nodeColor(type) {
      return {
        source: "#dbeafe",
        transcript: "#d1fae5",
        frame: "#cffafe",
        visual: "#fef3c7",
        timeline: "#ffedd5",
        semantics: "#ede9fe",
        creator: "#ffe4e6",
        asset: "#f2f4f7"
      }[type] || "#f2f4f7";
    }

    function previewDataForNode(node) {
      if (node.preview) return node.preview;
      if (!node.path) return null;
      if (isImagePath(node.path)) return { type: "image", src: node.path };
      if (isVideoPath(node.path)) return { type: "video", src: node.path };
      if (isAudioPath(node.path)) return { type: "audio", src: node.path };
      return null;
    }

    function isImagePath(path) {
      return /\.(apng|avif|gif|jpe?g|png|webp)$/i.test(path || "");
    }

    function isVideoPath(path) {
      return /\.(mp4|mov|m4v|webm|mkv|flv)$/i.test(path || "");
    }

    function isAudioPath(path) {
      return /\.(mp3|m4a|wav|aac|ogg|flac)$/i.test(path || "");
    }

    function resolveAssetUrl(path) {
      if (!path) return "";
      if (/^(https?:|file:|data:)/.test(path)) return path;
      if (path.startsWith("../")) return path;
      const base = String(window.SEED_ASSET_BASE || "..").replace(/\/$/, "");
      if (!base || base === ".") return path;
      return `${base}/${path}`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    document.getElementById("fitView").addEventListener("click", () => state.cy.fit(undefined, 72));
    document.getElementById("layoutGraph").addEventListener("click", () => runLayout({ fit: true }));
    toggleDetail.addEventListener("click", () => setDetailOpen(!state.detailOpen));
    compactGraph.addEventListener("click", () => {
      state.compactMode = true;
      state.expandedIds = new Set();
      reloadGraph({ fit: true });
    });
    expandGraph.addEventListener("click", () => {
      state.compactMode = false;
      state.expandedIds = new Set();
      reloadGraph({ fit: true });
    });
    graphSearch.addEventListener("input", () => {
      state.filter = graphSearch.value;
      reloadGraph({ fit: true });
    });

    init();
  </script>
</body>
</html>
